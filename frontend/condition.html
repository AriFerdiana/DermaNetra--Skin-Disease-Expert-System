<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detail Kondisi — DermaNetra</title>
  <meta name="description" content="Informasi lengkap kondisi kulit: gejala, penyebab, pengobatan, dan panduan." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/js/tailwind-config-landing.js"></script>
  <link rel="stylesheet" href="assets/css/landing.css?v=2" />
  <style>
    .detail-card {
      background: white;
      border: 1px solid #f1f5f9;
      border-radius: 16px;
      padding: 28px;
    }

    .detail-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 12px;
    }

    .detail-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .detail-list li {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #f8fafc;
      font-size: 14px;
      color: #334155;
      line-height: 1.5;
    }

    .detail-list li:last-child {
      border-bottom: none;
    }

    .detail-list .icon {
      flex-shrink: 0;
      width: 20px;
      text-align: center;
      margin-top: 2px;
    }

    .triage-strip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 700;
    }

    .triage-home {
      background: linear-gradient(135deg, #ecfdf5, #d1fae5);
      border: 2px solid #6ee7b7;
      color: #065f46;
    }

    .triage-gp {
      background: linear-gradient(135deg, #fffbeb, #fef3c7);
      border: 2px solid #fcd34d;
      color: #78350f;
    }

    .triage-specialist {
      background: linear-gradient(135deg, #fff7ed, #ffedd5);
      border: 2px solid #fdba74;
      color: #7c2d12;
    }

    .triage-emergency {
      background: linear-gradient(135deg, #fef2f2, #fee2e2);
      border: 2px solid #fca5a5;
      color: #7f1d1d;
    }

    .red-flag-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 14px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      color: #7f1d1d;
      line-height: 1.4;
    }
  </style>
</head>

<body class="font-inter bg-slate-50">

  <!-- Header (Minimal) -->
  <header class="sticky top-0 z-50 bg-white border-b border-slate-200" style="box-shadow:0 1px 12px rgba(0,0,0,.07)">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between gap-6">
      <a href="landing.html" class="flex items-center gap-2.5 flex-shrink-0">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center"
          style="background:linear-gradient(135deg,#0891b2,#0e7490)">
          <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
          </svg>
        </div>
        <span class="text-xl font-extrabold tracking-tight" style="color:#0e7490">DermaNetra</span>
      </a>
      <div class="flex items-center gap-4">
        <a href="landing.html"
          class="text-sm font-semibold text-slate-500 hover:text-primary-600 transition-colors flex items-center gap-1">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
          </svg>
          Kembali ke Portal
        </a>
        <a href="index.html"
          class="text-sm font-bold px-4 py-2 rounded-lg text-white transition-all"
          style="background:linear-gradient(135deg,#0891b2,#0e7490)">
          Mulai Diagnosis
        </a>
      </div>
    </div>
  </header>

  <!-- Content (rendered by JS) -->
  <main id="condition-content" class="max-w-5xl mx-auto px-6 py-10">
    <div class="text-center py-20">
      <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-primary-50 mb-4">
        <svg class="w-6 h-6 text-primary-500 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
      </div>
      <p class="text-slate-400 font-medium">Memuat data kondisi...</p>
    </div>
  </main>

  <!-- Footer Mini -->
  <footer class="bg-slate-900 text-white py-6">
    <div class="max-w-5xl mx-auto px-6">
      <div class="bg-slate-800 rounded-xl p-4 mb-4 border border-slate-700">
        <div class="flex items-start gap-3">
          <svg class="w-4 h-4 text-primary-400 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24"
            stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <p class="text-xs text-slate-400 leading-relaxed"><strong class="text-slate-200">Penafian Medis:</strong>
            Informasi ini hanya untuk edukasi. Bukan pengganti diagnosis atau konsultasi dokter. Selalu konsultasikan
            dengan dermatologis berlisensi.</p>
        </div>
      </div>
      <p class="text-xs text-slate-500 text-center">© 2026 DermaNetra · Institut Teknologi Nasional Bandung</p>
    </div>
  </footer>

  <script src="assets/js/diseases.js?v=4"></script>
  <script src="assets/js/landing.js?v=2"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // Reuse the loadDiseaseMetadata from landing.js
      if (typeof loadDiseaseMetadata === 'function') {
        await loadDiseaseMetadata();
      }

      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const container = document.getElementById('condition-content');

      if (!id || typeof DISEASE_DB === 'undefined' || !DISEASE_DB[id]) {
        container.innerHTML = `
          <div class="text-center py-20">
            <div class="text-6xl mb-4">🔍</div>
            <h2 class="text-2xl font-extrabold text-slate-800 mb-2">Kondisi Tidak Ditemukan</h2>
            <p class="text-slate-500 mb-6">ID "${id || '?'}" tidak ada dalam database kami.</p>
            <a href="landing.html" class="cta-btn inline-flex">← Kembali ke Portal</a>
          </div>`;
        return;
      }

      const d = DISEASE_DB[id];
      const tx = d.treatments || d.treatment || {};

      // Triage config
      const TRIAGE_MAP = {
        'home_care': { icon: '🟢', label: 'Perawatan Mandiri', cls: 'triage-home' },
        'gp_visit': { icon: '🟡', label: 'Konsultasi Dokter Umum', cls: 'triage-gp' },
        'specialist': { icon: '🟠', label: 'Rujukan Spesialis', cls: 'triage-specialist' },
        'emergency': { icon: '🔴', label: 'Segera ke Dokter / UGD', cls: 'triage-emergency' },
      };
      const triage = TRIAGE_MAP[d.triage_level] || TRIAGE_MAP['gp_visit'];

      // Update page title
      document.title = `${d.name_id || id} — DermaNetra`;

      // Build the page
      container.innerHTML = `
        <!-- Breadcrumb -->
        <div class="flex items-center gap-2 text-xs text-slate-400 mb-6 font-medium">
          <a href="landing.html" class="hover:text-primary-600 transition-colors">Portal</a>
          <span>›</span>
          <a href="landing.html#conditions-section" class="hover:text-primary-600 transition-colors">Kondisi Kulit</a>
          <span>›</span>
          <span class="text-slate-600">${d.name_id || id}</span>
        </div>

        <!-- Header Card -->
        <div class="detail-card mb-6" style="background:linear-gradient(135deg,#0f172a,#0e7490);color:white;border:none">
          <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-4">
            <div>
              <p class="text-xs font-bold uppercase tracking-widest text-white/50 mb-1">${d.name || ''}</p>
              <h1 class="text-3xl md:text-4xl font-black mb-3">${d.name_id || id}</h1>
              <p class="text-white/70 text-sm leading-relaxed max-w-2xl">${d.description || ''}</p>
            </div>
            <div class="flex flex-col gap-2 flex-shrink-0">
              <span class="inline-flex items-center gap-1 bg-white/10 text-white/80 text-xs font-bold px-3 py-1.5 rounded-full">ICD-10: ${d.icd10 || '-'}</span>
              <span class="inline-flex items-center gap-1 bg-white/10 text-white/80 text-xs font-bold px-3 py-1.5 rounded-full">${d.prevalence || 'Common'}</span>
              <span class="inline-flex items-center gap-1 text-xs font-bold px-3 py-1.5 rounded-full ${d.contagious ? 'bg-red-500/20 text-red-200' : 'bg-green-500/20 text-green-200'}">${d.contagious ? '⚠️ Menular' : '✅ Tidak Menular'}</span>
            </div>
          </div>
        </div>

        <!-- Triage -->
        <div class="triage-strip ${triage.cls} mb-6">
          <span class="text-xl">${triage.icon}</span>
          <div>
            <div class="text-sm font-extrabold">${triage.label}</div>
            <div class="text-xs font-medium opacity-80">${d.triage_note || ''}</div>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
          <!-- Clinical Features -->
          <div class="detail-card">
            <p class="detail-label">📋 Fitur Klinis</p>
            <ul class="detail-list">
              ${(d.clinical_features || []).map(f => '<li><span class="icon">•</span>' + f + '</li>').join('')}
            </ul>
          </div>

          <!-- Causes & Risk Factors -->
          <div class="detail-card">
            <p class="detail-label">⚠️ Penyebab & Faktor Risiko</p>
            <ul class="detail-list">
              ${(d.causes || []).map(c => '<li><span class="icon">•</span>' + c + '</li>').join('')}
            </ul>
          </div>
        </div>

        <!-- Treatment -->
        <div class="detail-card mb-6">
          <p class="detail-label">💊 Rencana Perawatan</p>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            ${tx.otc ? '<div><p class="text-xs font-bold text-green-700 uppercase tracking-wide mb-3 flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-green-500"></span> Obat Bebas (OTC)</p><ul class="detail-list">' + tx.otc.map(m => '<li><span class="icon">💊</span>' + m + '</li>').join('') + '</ul></div>' : ''}
            ${tx.prescription ? '<div><p class="text-xs font-bold text-blue-700 uppercase tracking-wide mb-3 flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span> Resep Dokter</p><ul class="detail-list">' + tx.prescription.map(m => '<li><span class="icon">📝</span>' + m + '</li>').join('') + '</ul></div>' : ''}
            ${tx.lifestyle ? '<div><p class="text-xs font-bold text-purple-700 uppercase tracking-wide mb-3 flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-purple-500"></span> Gaya Hidup</p><ul class="detail-list">' + tx.lifestyle.map(m => '<li><span class="icon">🌿</span>' + m + '</li>').join('') + '</ul></div>' : ''}
          </div>
          ${tx.see_doctor ? '<div class="mt-4 p-3 bg-amber-50 border border-amber-200 rounded-xl text-sm text-amber-800"><strong>⚠️ Kapan ke Dokter:</strong> ' + tx.see_doctor + '</div>' : ''}
        </div>

        <!-- Red Flags -->
        ${d.red_flags && d.red_flags.length ? '<div class="detail-card mb-6" style="background:linear-gradient(135deg,#fef2f2,#fff5f5);border-color:#fecaca"><p class="detail-label" style="color:#991b1b">🚩 Tanda Bahaya — Segera ke Dokter</p><div class="flex flex-col gap-3">' + d.red_flags.map(f => '<div class="red-flag-item"><span class="flex-shrink-0">🚩</span>' + f + '</div>').join('') + '</div></div>' : ''}

        <!-- CTA: Start Diagnosis -->
        <div class="text-center py-8">
          <p class="text-slate-500 text-sm mb-4">Merasa mengalami gejala serupa?</p>
          <a href="index.html" class="cta-btn inline-flex">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
            </svg>
            Mulai AI Symptom Checker
          </a>
        </div>

        <!-- References -->
        ${d.references && d.references.length ? '<div class="text-xs text-slate-400 border-t border-slate-200 pt-4"><p class="font-bold text-slate-500 mb-1">Referensi:</p>' + d.references.map(r => '<p>' + r + '</p>').join('') + '</div>' : ''}
      `;
    });
  </script>
</body>

</html>
