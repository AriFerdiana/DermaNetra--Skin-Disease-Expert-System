<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masuk / Daftar — DermaNetra</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/js/tailwind-config-landing.js"></script>
  <link rel="stylesheet" href="assets/css/landing.css?v=2" />
  <style>
    body {
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .auth-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    
    .auth-card {
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.05);
      width: 100%;
      max-w: 440px;
      padding: 40px;
      border: 1px solid rgba(0, 0, 0, 0.04);
    }
    
    .input-field {
      width: 100%;
      background: #f1f5f9;
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 500;
      color: #334155;
      transition: all 0.2s;
      outline: none;
    }
    
    .input-field:focus {
      border-color: #0891b2;
      background: white;
      box-shadow: 0 4px 12px rgba(8, 145, 178, 0.1);
    }
    
    .input-field::placeholder {
      color: #94a3b8;
      font-weight: 400;
    }

    .btn-auth {
      width: 100%;
      background: linear-gradient(135deg, #0891b2, #0e7490);
      color: white;
      font-weight: 700;
      padding: 16px;
      border-radius: 14px;
      font-size: 16px;
      transition: all 0.2s;
      box-shadow: 0 8px 24px rgba(8, 145, 178, 0.25);
    }

    .btn-auth:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(8, 145, 178, 0.35);
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 24px 0;
      color: #cbd5e1;
    }
    
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #e2e8f0;
    }
    
    .divider span {
      padding: 0 10px;
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
    }

    .btn-social {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-weight: 600;
      color: #475569;
      background: white;
      transition: all 0.2s;
    }
    
    .btn-social:hover {
      background: #f8fafc;
      border-color: #cbd5e1;
    }
  </style>
</head>

<body class="font-inter">

  <div class="absolute top-6 left-6 z-10">
    <a href="landing.html" class="flex items-center gap-2 group">
      <div class="w-8 h-8 md:w-10 md:h-10 rounded-lg flex items-center justify-center bg-gradient-to-br from-cyan-600 to-cyan-800 shadow-md transform group-hover:-translate-x-1 transition-all">
        <svg class="w-4 h-4 md:w-5 md:h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
      </div>
      <span class="text-sm font-bold text-slate-500 group-hover:text-cyan-700">Kembali ke Portal</span>
    </a>
  </div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="text-center mb-8">
        <div class="inline-flex w-12 h-12 rounded-xl bg-cyan-50 items-center justify-center mb-4">
          <svg class="w-6 h-6 text-cyan-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
          </svg>
        </div>
        <h1 class="text-2xl font-black text-slate-800 tracking-tight">Selamat Datang</h1>
        <p class="text-sm text-slate-500 mt-1">Masuk untuk menyimpan hasil riwayat diagnosis dan log kulit harian Anda.</p>
      </div>

      <form id="login-form">
        <div class="mb-5">
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Email</label>
          <input type="email" class="input-field" placeholder="nama@email.com" required>
        </div>
        
        <div class="mb-2">
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Kata Sandi</label>
          <input type="password" class="input-field" placeholder="••••••••" required>
        </div>
        
        <div class="flex justify-end mb-6">
          <a href="#" class="text-xs font-semibold text-cyan-600 hover:text-cyan-700">Lupa sandi?</a>
        </div>

        <button type="submit" class="btn-auth">Masuk ke DermaNetra</button>
      </form>

      <div class="divider"><span>ATAU</span></div>

      <button class="btn-social">
        <svg class="w-5 h-5" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Lanjutkan dengan Google
      </button>

      <p class="text-center text-sm text-slate-500 mt-8 font-medium">
        Belum punya akun? <a href="#" class="text-cyan-600 font-bold hover:underline">Daftar sekarang</a>
      </p>
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      // Simulasi sukses login
      const btn = e.target.querySelector('button[type="submit"]');
      const originTitle = btn.textContent;
      btn.textContent = 'Memverifikasi...';
      btn.style.opacity = '0.8';
      
      setTimeout(() => {
        alert("Simulasi berhasil! Mengalihkan ke halaman utama...");
        window.location.href = 'landing.html';
      }, 1000);
    });
  </script>
</body>
</html>
